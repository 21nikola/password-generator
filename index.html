<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Password Generator PRO</title>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: #1e293b;
    padding: 25px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  }

  #password {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
    margin: 15px 0;
    font-size: 18px;
  }

  button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .generate { background: #22c55e; }
  .copy { background: #3b82f6; }

  button:hover {
    transform: scale(1.05);
  }

  #strength {
    margin-top: 10px;
  }

  input[type="range"] {
    width: 100%;
  }

  .options {
    text-align: left;
    margin-top: 10px;
  }

  ul {
    margin-top: 15px;
    padding: 0;
    list-style: none;
  }

  li {
    background: #0f172a;
    padding: 5px;
    margin: 3px 0;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Password Generator 🔐</h2>

  <div id="password">Učitavanje...</div>

  <button class="generate" onclick="generate()">Generate</button>
  <button class="copy" onclick="copyPassword()">Copy</button>

  <div id="strength"></div>

  <!-- SLIDER -->
  <div>
    <label>Dužina: <span id="lenValue">14</span></label>
    <input type="range" id="length" min="8" max="32" value="14">
  </div>

  <!-- OPTIONS -->
  <div class="options">
    <label><input type="checkbox" id="useSymbols" checked> Simboli</label><br>
    <label><input type="checkbox" id="useNumbers" checked> Brojevi</label>
  </div>

  <!-- HISTORY -->
  <ul id="history"></ul>

</div>

<script>
let words = [];
const allSymbols = ["!", "@", "#", "$", "%", "&"];

// učitavanje JSON
fetch("./words.json")
  .then(res => res.json())
  .then(data => {
    words = data;
    document.getElementById("password").innerText = "Klikni Generate ✅";
  });

// slider
const slider = document.getElementById("length");
const lenValue = document.getElementById("lenValue");

slider.oninput = function() {
  lenValue.innerText = this.value;
};

// random helper
function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// capitalize prva slova
function capitalizeFirst(str) {
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

// strength
function checkStrength(pass) {
  let score = 0;
  if (pass.length >= 12) score++;
  if (/[A-Z]/.test(pass)) score++;
  if (/[0-9]/.test(pass)) score++;
  if (/[^A-Za-z0-9]/.test(pass)) score++;

  const levels = ["Weak", "OK", "Good", "Strong"];
  document.getElementById("strength").innerText =
    "Strength: " + levels[score - 1];
}

// history
function addToHistory(pass) {
  let li = document.createElement("li");
  li.innerText = pass;
  document.getElementById("history").prepend(li);
}

// generator
function generate() {
  if (words.length === 0) return;

  const length = parseInt(slider.value);
  const useSymbols = document.getElementById("useSymbols").checked;
  const useNumbers = document.getElementById("useNumbers").checked;

  let pass = "";

  while (pass.length < length) {
    pass += rand(words);

    if (useSymbols && pass.length < length) {
      pass += rand(allSymbols);
    }

    if (useNumbers && pass.length < length) {
      pass += Math.floor(Math.random() * 10);
    }
  }

  pass = pass.slice(0, length);
  pass = capitalizeFirst(pass);

  document.getElementById("password").innerText = pass;

  checkStrength(pass);
  addToHistory(pass);
}

// copy
function copyPassword() {
  let text = document.getElementById("password").innerText;
  navigator.clipboard.writeText(text);
  document.getElementById("strength").innerText = "Kopirano ✅";
}
</script>

</body>
</html>
